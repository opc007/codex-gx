version: 2
updates:
  # 自动更新 Rust 依赖
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"

  # 自动更新 npm 依赖
  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automerge"
    commit-message:
      prefix: "chore"
