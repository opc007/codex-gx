<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="Codex gx  Codex Cube logo">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050818"/>
      <stop offset="0.5" stop-color="#0d1338"/>
      <stop offset="1" stop-color="#1a1f4a"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe680"/>
      <stop offset="0.5" stop-color="#ffb800"/>
      <stop offset="1" stop-color="#a87a0a"/>
    </linearGradient>
    <linearGradient id="goldLightB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd700"/>
      <stop offset="1" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="goldDarkB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a87a0a"/>
      <stop offset="1" stop-color="#5c4209"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="480" height="240" rx="36" fill="url(#bgB)"/>

  <g transform="translate(140, 120)">
    <polygon points="0,-50 70,-15 70,55 0,90 -70,55 -70,-15" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.15"/>

    <polygon points="0,-50 50,-25 0,0 -50,-25" fill="url(#goldB)" stroke="#050818" stroke-width="0.8"/>
    <polygon points="0,0 50,-25 50,45 0,70" fill="url(#goldLightB)" stroke="#050818" stroke-width="0.8"/>
    <polygon points="0,0 -50,-25 -50,45 0,70" fill="url(#goldDarkB)" stroke="#050818" stroke-width="0.8"/>

    <text x="0" y="15" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="900" fill="#050818" font-style="italic">G</text>
  </g>

  <g transform="translate(305, 95)">
    <line x1="-45" y1="-35" x2="45" y2="55" stroke="url(#goldB)" stroke-width="13" stroke-linecap="round"/>
    <line x1="45" y1="-35" x2="-45" y2="55" stroke="url(#goldB)" stroke-width="13" stroke-linecap="round"/>
    <circle cx="-45" cy="-35" r="4" fill="#ffe680"/>
    <circle cx="45" cy="-35" r="4" fill="#ffe680"/>
    <circle cx="45" cy="55" r="4" fill="#a87a0a"/>
    <circle cx="-45" cy="55" r="4" fill="#a87a0a"/>
  </g>

  <g transform="translate(240, 200)">
    <text x="0" y="0" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffd700" letter-spacing="8">CODEX GX</text>
  </g>
